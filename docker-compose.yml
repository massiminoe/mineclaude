services:
  mc-server:
    image: itzg/minecraft-server:latest
    environment:
      EULA: "TRUE"
      VERSION: "1.21.5"
      ONLINE_MODE: "false"
      DIFFICULTY: "peaceful"
      GAMEMODE: "survival"
      SPAWN_PROTECTION: "0"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "mineclaude"
    ports:
      - "25565:25565"
    healthcheck:
      test: mc-health
      interval: 10s
      retries: 12
      start_period: 60s

  mc-client:
    build:
      context: .
      dockerfile: mc-client/Dockerfile
    depends_on:
      mc-server:
        condition: service_healthy
    environment:
      DISPLAY: ":99"
      LIBGL_ALWAYS_SOFTWARE: "1"
      # Monitor-only video filter — brightens the /video/stream feed so dark
      # caves stay visible. Does NOT affect /screenshot (agent vision). Set
      # to "" to disable, or tweak gamma/brightness/contrast to taste.
      # MONITOR_VIDEO_FILTER: "eq=gamma=2.0:brightness=0.08:contrast=1.15"
    ports:
      # Native Fabric mod bridge — HTTP on 8081, events WS on 8082
      # (separate listener because JDK HttpServer doesn't speak WS
      # upgrades). The legacy Python bridge on 8080 was decommissioned
      # in Phase 8.
      - "8081:8081"
      - "8082:8082"
    volumes:
      - hmc-assets:/headlessmc/HeadlessMC/run/assets
    stdin_open: true
    tty: true

volumes:
  hmc-assets:
