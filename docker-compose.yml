services:
  mc-server:
    image: itzg/minecraft-server:latest
    environment:
      EULA: "TRUE"
      VERSION: "1.21.5"
      ONLINE_MODE: "false"
      # Offline mode can't produce Mojang-signed chat; with secure-profile
      # enforcement left on (the vanilla default), the server kicks human
      # players ("lost connection: Disconnected") on join or first chat
      # message. Disable enforcement so human players (e.g. Massimino) stay
      # connected. The bot sidesteps this separately by speaking via /tellraw.
      ENFORCE_SECURE_PROFILE: "false"
      DIFFICULTY: "peaceful"
      GAMEMODE: "survival"
      SPAWN_PROTECTION: "0"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "mineclaude"
      VIEW_DISTANCE: "6"
      SIMULATION_DISTANCE: "6"
    ports:
      - "25565:25565"
    volumes:
      # Seed the op list with Massimino's *offline-mode* UUID
      # (md5("OfflinePlayer:Massimino")). In offline mode `op <name>` can't
      # resolve the correct UUID until that player has joined once (it falls
      # back to an online lookup that yields the wrong premium UUID), so we
      # seed ops.json directly — opped from the very first join, survives
      # `down -v`. Read-only: we never op/deop in-game, so the server has no
      # reason to rewrite it. itzg leaves the file alone because the OPS env
      # is unset (its name->UUID lookup is the unreliable offline path).
      - ./mc-server/ops.json:/data/ops.json:ro
    healthcheck:
      test: mc-health
      interval: 10s
      retries: 12
      start_period: 60s

  mc-client:
    # 3arthqu4ke/headlessmc:latest is published amd64-only (no arm64 manifest),
    # so on Apple Silicon we must build + run it under emulation. Without this
    # pin, BuildKit resolves the native arm64 platform and the registry returns
    # "no match for platform in manifest". (It "worked before" only because a
    # previously-pulled amd64 image was cached locally; a docker prune removes
    # that crutch and re-exposes the mismatch.)
    platform: linux/amd64
    build:
      context: .
      dockerfile: mc-client/Dockerfile
    depends_on:
      mc-server:
        condition: service_healthy
    environment:
      DISPLAY: ":99"
      LIBGL_ALWAYS_SOFTWARE: "1"
      # Monitor-only video filter — brightens the /video/stream feed so dark
      # caves stay visible. Does NOT affect /screenshot (agent vision). Set
      # to "" to disable, or tweak gamma/brightness/contrast to taste.
      # MONITOR_VIDEO_FILTER: "eq=gamma=2.0:brightness=0.08:contrast=1.15"
      # Gameplay recorder (bridge mod's RecordRoute): when "1", an ffmpeg taps
      # the same :99 framebuffer (x11grab is a read-only grab, so it doesn't
      # conflict with /screenshot or /video/stream) and writes ONE continuous
      # 5 fps / CRF 28 H.264 .mp4 per run to /recordings — bind-mounted to
      # ./state/video on the host (plays natively in QuickTime; a clean
      # stop/roll/shutdown finalizes it, an abrupt kill can spoil the open
      # file). POST /record/roll cuts a fresh file without a restart.
      # Reuses MONITOR_VIDEO_FILTER for the same cave-brightening. Set to "0"
      # to disable. ~170 MB/hr.
      RECORD_VIDEO: "1"
    ports:
      # Native Fabric mod bridge — HTTP on 8081, events WS on 8082
      # (separate listener because JDK HttpServer doesn't speak WS
      # upgrades). The legacy Python bridge on 8080 was decommissioned
      # in Phase 8.
      - "8081:8081"
      - "8082:8082"
    volumes:
      - hmc-assets:/headlessmc/HeadlessMC/run/assets
      # Gameplay recordings land here (host: ./state/video). Created by the
      # recorder ffmpeg in entrypoint.sh when RECORD_VIDEO=1.
      - ./state/video:/recordings
    stdin_open: true
    tty: true

volumes:
  hmc-assets:
